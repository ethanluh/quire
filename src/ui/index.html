<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quire</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

  header { padding: 16px 24px; border-bottom: 1px solid #1e2533; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.04em; }
  header .subtitle { font-size: 13px; color: #64748b; }

  .tabs { display: flex; gap: 2px; padding: 12px 24px 0; border-bottom: 1px solid #1e2533; }
  .tab { padding: 8px 16px; font-size: 13px; cursor: pointer; border-radius: 6px 6px 0 0; color: #64748b; border-bottom: 2px solid transparent; }
  .tab.active { color: #e2e8f0; border-bottom-color: #6366f1; }

  .pane { display: none; padding: 24px; }
  .pane.active { display: block; }

  .card-list { display: flex; flex-direction: column; gap: 16px; max-width: 720px; }

  .card {
    background: #161b27;
    border: 1px solid #1e2533;
    border-radius: 10px;
    padding: 20px;
  }
  .card.flagged { border-left: 3px solid #ef4444; }
  .card.clean { border-left: 3px solid #22c55e; }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .card-direction { font-size: 15px; font-weight: 600; line-height: 1.4; flex: 1; margin-right: 12px; }
  .card-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 12px; font-weight: 500; }
  .badge-blast { background: #1e2533; color: #94a3b8; }
  .badge-flag { background: #2d1f0e; color: #f59e0b; }
  .badge-drift-clean { background: #0d2016; color: #22c55e; }
  .badge-drift-flagged { background: #2d0d0d; color: #ef4444; }

  .drift-signals { margin-top: 8px; padding: 10px 12px; background: #1a1020; border-radius: 6px; font-size: 12px; color: #e879f9; }
  .drift-signals ul { padding-left: 16px; margin-top: 4px; }
  .drift-signals li { margin-top: 3px; }

  .residual { margin-top: 10px; font-size: 11px; color: #475569; font-style: italic; }

  .gestures { display: flex; gap: 8px; margin-top: 14px; }
  .btn { padding: 7px 18px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn-accept { background: #22c55e; color: #000; }
  .btn-defer  { background: #6366f1; color: #fff; }
  .btn-reject { background: #ef4444; color: #fff; }

  .shelf-tray { background: #1a1f2e; border: 1px dashed #2d3748; border-radius: 10px; padding: 16px 20px; }
  .shelf-tray h3 { font-size: 13px; color: #64748b; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.06em; }

  .ingest-form { max-width: 600px; }
  .ingest-form textarea { width: 100%; height: 220px; background: #161b27; border: 1px solid #1e2533; border-radius: 8px; color: #e2e8f0; font-family: monospace; font-size: 12px; padding: 12px; resize: vertical; }
  .ingest-form .btn-ingest { margin-top: 10px; background: #6366f1; color: #fff; padding: 9px 22px; font-size: 13px; border-radius: 6px; border: none; cursor: pointer; }
  .result-msg { margin-top: 10px; font-size: 13px; color: #22c55e; }
  .result-msg.error { color: #ef4444; }

  .empty { color: #475569; font-size: 14px; padding: 40px 0; text-align: center; }
  .queue-list { display: flex; flex-direction: column; gap: 8px; max-width: 600px; }
  .queue-entry { background: #161b27; border: 1px solid #1e2533; border-radius: 8px; padding: 14px 18px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
  .queue-entry .entry-id { font-family: monospace; color: #94a3b8; font-size: 11px; }
  .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .status-queued  { background: #1e2533; color: #94a3b8; }
  .status-landing { background: #2d1f0e; color: #f59e0b; }
  .status-landed  { background: #0d2016; color: #22c55e; }
</style>
</head>
<body>
<header>
  <h1>Quire</h1>
  <span class="subtitle">Direction triage for swarm PRs</span>
</header>

<div class="tabs">
  <div class="tab active" data-tab="review">Review queue</div>
  <div class="tab" data-tab="shelf">Shelf</div>
  <div class="tab" data-tab="queue">Merge queue</div>
  <div class="tab" data-tab="ingest">Ingest</div>
</div>

<div id="pane-review" class="pane active">
  <div class="card-list" id="card-list">
    <div class="empty">No bundles in review queue.</div>
  </div>
</div>

<div id="pane-shelf" class="pane">
  <div class="shelf-tray">
    <h3>Deferred for closer inspection</h3>
    <div class="card-list" id="shelf-list">
      <div class="empty">Shelf is empty.</div>
    </div>
  </div>
</div>

<div id="pane-queue" class="pane">
  <div class="queue-list" id="queue-list">
    <div class="empty">Merge queue is empty.</div>
  </div>
  <button class="btn btn-accept" style="margin-top:16px" id="btn-process">Process next</button>
</div>

<div id="pane-ingest" class="pane">
  <div class="ingest-form">
    <p style="font-size:13px;color:#64748b;margin-bottom:10px">Paste a PR payload (or array of payloads) as JSON:</p>
    <textarea id="ingest-payload" placeholder='{"id":"pr-1","repoOwner":"org","repoName":"repo","number":1,"declaredDirection":"add passwordless auth","diff":{"raw":"...","hunks":[]},"ciStatus":"success"}'></textarea>
    <button class="btn-ingest" id="btn-ingest">Ingest</button>
    <div id="ingest-result" class="result-msg" style="display:none"></div>
  </div>
</div>

<script>
const tabs = document.querySelectorAll('.tab');
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    document.getElementById('pane-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'review') loadReview();
    if (tab.dataset.tab === 'shelf') loadShelf();
    if (tab.dataset.tab === 'queue') loadQueue();
  });
});

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function driftBadge(drift) {
  if (drift.status === 'clean') return '<span class="badge badge-drift-clean">Clean</span>';
  return '<span class="badge badge-drift-flagged">Drift flagged</span>';
}

function renderSignals(drift) {
  if (drift.status !== 'flagged') return '';
  const items = drift.signals.map(s => {
    if (s.kind === 'effectList') return `Orphan effects: ${escapeHtml(s.orphanClauses.join(', '))}`;
    if (s.kind === 'footprintAnomaly') return `Surprising symbols: ${escapeHtml(s.surprisingSymbols.map(x => x.name).join(', '))}`;
    return escapeHtml(s.description);
  });
  return `<div class="drift-signals"><strong>Drift signals</strong><ul>${items.map(i => `<li>${i}</li>`).join('')}</ul></div>`;
}

function cardHtml(card, shelfMode) {
  const cls = card.drift.status === 'flagged' ? 'flagged' : 'clean';
  const flags = card.flags.map(f => `<span class="badge badge-flag">${escapeHtml(f)}</span>`).join('');
  const bundleId = escapeHtml(card.bundleId);
  const gestures = shelfMode
    ? `<button class="btn btn-accept" onclick="promote('${bundleId}')">Unshelf</button>`
    : `<button class="btn btn-accept" onclick="gesture('${bundleId}','accept')">Accept →</button>
       <button class="btn btn-defer"  onclick="gesture('${bundleId}','defer')">Defer ↓</button>
       <button class="btn btn-reject" onclick="gesture('${bundleId}','reject')">Reject ←</button>`;
  return `<div class="card ${cls}" id="card-${bundleId}">
    <div class="card-header"><div class="card-direction">${escapeHtml(card.directionSummary)}</div></div>
    <div class="card-meta">
      <span class="badge badge-blast">Blast radius: ${card.blastRadius} files</span>
      ${driftBadge(card.drift)} ${flags}
    </div>
    ${renderSignals(card.drift)}
    <div class="residual">${escapeHtml(card.residualDisclosure)}</div>
    <div class="gestures">${gestures}</div>
  </div>`;
}

async function loadReview() {
  const cards = await api('GET', '/bundles');
  const el = document.getElementById('card-list');
  el.innerHTML = cards.length ? cards.map(c => cardHtml(c, false)).join('') : '<div class="empty">No bundles in review queue.</div>';
}

async function loadShelf() {
  const cards = await api('GET', '/shelf');
  const el = document.getElementById('shelf-list');
  el.innerHTML = cards.length ? cards.map(c => cardHtml(c, true)).join('') : '<div class="empty">Shelf is empty.</div>';
}

async function loadQueue() {
  const entries = await api('GET', '/queue');
  const el = document.getElementById('queue-list');
  if (!entries.length) { el.innerHTML = '<div class="empty">Merge queue is empty.</div>'; return; }
  el.innerHTML = entries.map(e => `<div class="queue-entry">
    <div><div>${escapeHtml(e.bundle.direction)}</div><div class="entry-id">${escapeHtml(e.bundleId)}</div></div>
    <span class="status-badge status-${escapeHtml(e.status)}">${escapeHtml(e.status)}</span>
  </div>`).join('');
}

async function gesture(bundleId, action) {
  await api('POST', `/bundles/${bundleId}/gesture`, { action });
  loadReview();
  if (action === 'defer') loadShelf();
  if (action === 'accept') loadQueue();
}

async function promote(bundleId) {
  await api('DELETE', `/shelf/${bundleId}`);
  loadShelf();
  loadReview();
}

document.getElementById('btn-process').addEventListener('click', async () => {
  await api('POST', '/queue/process');
  loadQueue();
});

document.getElementById('btn-ingest').addEventListener('click', async () => {
  const raw = document.getElementById('ingest-payload').value.trim();
  const el = document.getElementById('ingest-result');
  try {
    const body = JSON.parse(raw);
    const result = await api('POST', '/prs/ingest', body);
    el.textContent = `Ingested: ${result.bundlesCreated} bundle(s) created.`;
    el.className = 'result-msg';
    el.style.display = 'block';
    loadReview();
  } catch (e) {
    el.textContent = 'Error: ' + e.message;
    el.className = 'result-msg error';
    el.style.display = 'block';
  }
});

loadReview();
</script>
</body>
</html>
