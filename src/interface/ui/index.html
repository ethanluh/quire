<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quire</title>
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/components.css">
<style>
  header {
    padding: var(--space-4) var(--space-6);
    border-bottom: 1px solid var(--color-border);
    display: flex;
    align-items: center;
    gap: var(--space-3);
    background: var(--color-surface-card);
  }
  header h1 {
    font-family: var(--font-display);
    font-size: var(--text-xl);
    font-weight: var(--weight-semibold);
    letter-spacing: var(--tracking-tight);
    color: var(--color-text-primary);
  }
  header .subtitle { font-size: var(--text-sm); color: var(--color-text-muted); }
  header .btn-theme { margin-left: auto; }
  header a.btn { text-decoration: none; }

  .tabs { padding: var(--space-3) var(--space-6) 0; background: var(--color-surface-page); }

  .pane { display: none; padding: var(--space-6); }
  .pane.active { display: block; }

  .card-list { display: flex; flex-direction: column; gap: var(--space-4); max-width: 720px; }

  .card-meta { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-bottom: var(--space-3); }

  /* Drift signals read as a noted observation, not a warning. */
  .drift-signals {
    margin-top: var(--space-3);
    padding: var(--space-3) var(--space-4);
    background: var(--color-surface-sunken);
    border-left: 2px solid var(--color-flagged);
    border-radius: var(--radius-sm);
    font-size: var(--text-sm);
    color: var(--color-text-secondary);
  }
  .drift-signals strong { color: var(--color-text-primary); font-weight: var(--weight-medium); }
  .drift-signals ul { padding-left: var(--space-4); margin: var(--space-1) 0 0; }
  .drift-signals li { margin-top: var(--space-1); }

  .gestures { display: flex; gap: var(--space-2); margin-top: var(--space-4); }

  .shelf-tray h3 {
    font-size: var(--text-sm);
    font-weight: var(--weight-medium);
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: var(--tracking-wider);
    margin: 0 0 var(--space-4);
  }

  .ingest-form { max-width: 600px; }
  .ingest-form p { font-size: var(--text-sm); color: var(--color-text-muted); margin-bottom: var(--space-3); }
  .ingest-form textarea {
    width: 100%;
    height: 220px;
    background: var(--color-surface-overlay);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    color: var(--color-text-primary);
    font-family: var(--font-mono);
    font-size: var(--text-sm);
    padding: var(--space-3);
    resize: vertical;
  }
  .ingest-form textarea:focus-visible { outline: none; box-shadow: var(--focus-ring); }
  .ingest-form .btn-ingest { margin-top: var(--space-3); }
  .result-msg { margin-top: var(--space-3); font-size: var(--text-sm); color: var(--color-accept); }
  .result-msg.error { color: var(--color-reject); }

  .empty { color: var(--color-text-faint); font-size: var(--text-base); padding: var(--space-10) 0; text-align: center; }

  .queue-list { display: flex; flex-direction: column; gap: var(--space-2); max-width: 600px; }
  .queue-entry {
    background: var(--color-surface-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: var(--space-3) var(--space-4);
    font-size: var(--text-sm);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .queue-entry .entry-id { font-family: var(--font-mono); color: var(--color-text-muted); font-size: var(--text-xs); }

  .status-badge {
    font-size: var(--text-xs);
    padding: var(--space-1) var(--space-3);
    border-radius: var(--radius-pill);
  }
  .status-queued  { background: var(--color-surface-sunken); color: var(--color-text-secondary); }
  .status-landing { background: var(--color-flagged-wash); color: var(--color-flagged); }
  .status-landed  { background: var(--color-accept-wash); color: var(--color-accept); }
</style>
</head>
<body>
<header>
  <h1>Quire</h1>
  <span class="subtitle">Direction triage for swarm PRs</span>
  <button class="btn btn-defer btn-theme" id="btn-theme" title="Switch theme">Dark</button>
  <a class="btn btn-defer" id="link-mobile" href="mobile.html">Mobile view</a>
  <button class="btn btn-reject btn-clear-all" id="btn-clear-all" style="display:none" title="Wipe all bundles, shelf, queue, and audit data on this server">Clear all data</button>
</header>

<div class="tabs">
  <div class="tab active" data-tab="review">Review queue</div>
  <div class="tab" data-tab="shelf">Shelf</div>
  <div class="tab" data-tab="queue">Merge queue</div>
  <div class="tab" data-tab="ingest">Ingest</div>
</div>

<div id="pane-review" class="pane active">
  <div class="card-list" id="card-list">
    <div class="empty">No bundles in review queue.</div>
  </div>
</div>

<div id="pane-shelf" class="pane">
  <div class="shelf-tray">
    <h3>Deferred for closer inspection</h3>
    <div class="card-list" id="shelf-list">
      <div class="empty">Shelf is empty.</div>
    </div>
  </div>
</div>

<div id="pane-queue" class="pane">
  <div class="queue-list" id="queue-list">
    <div class="empty">Merge queue is empty.</div>
  </div>
  <button class="btn btn-accept" style="margin-top:16px" id="btn-process">Process next</button>
</div>

<div id="pane-ingest" class="pane">
  <div class="ingest-form">
    <p>Paste a PR payload (or array of payloads) as JSON:</p>
    <textarea id="ingest-payload" placeholder='{"id":"pr-1","repoOwner":"org","repoName":"repo","number":1,"declaredDirection":"add passwordless auth","diff":{"raw":"...","hunks":[]},"ciStatus":"success"}'></textarea>
    <button class="btn btn-defer btn-ingest" id="btn-ingest">Ingest</button>
    <div id="ingest-result" class="result-msg" style="display:none"></div>
  </div>
</div>

<script>
const tabs = document.querySelectorAll('.tab');
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    document.getElementById('pane-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'review') loadReview();
    if (tab.dataset.tab === 'shelf') loadShelf();
    if (tab.dataset.tab === 'queue') loadQueue();
  });
});

async function api(method, path, body, extraHeaders) {
  const opts = { method, headers: { 'Content-Type': 'application/json', ...(extraHeaders || {}) } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function driftBadge(drift) {
  if (drift.status === 'clean') return '<span class="badge badge-clean">Clean</span>';
  return '<span class="badge badge-flagged">Drift flagged</span>';
}

function renderSignals(drift) {
  if (drift.status !== 'flagged') return '';
  const items = drift.signals.map(s => {
    if (s.kind === 'effectList') return `Orphan effects: ${escapeHtml(s.orphanClauses.join(', '))}`;
    if (s.kind === 'footprintAnomaly') return `Surprising symbols: ${escapeHtml(s.surprisingSymbols.map(x => x.name).join(', '))}`;
    return escapeHtml(s.description);
  });
  return `<div class="drift-signals"><strong>Drift signals (noted, not an error)</strong><ul>${items.map(i => `<li>${i}</li>`).join('')}</ul></div>`;
}

function cardHtml(card, shelfMode) {
  const flags = card.flags.map(f => `<span class="badge badge-neutral">${escapeHtml(f)}</span>`).join('');
  const bundleId = escapeHtml(card.bundleId);
  const gestures = shelfMode
    ? `<button class="btn btn-accept" onclick="promote('${bundleId}')">Unshelf</button>`
    : `<button class="btn btn-accept" onclick="gesture('${bundleId}','accept')">Accept</button>
       <button class="btn btn-defer"  onclick="gesture('${bundleId}','defer')">Defer</button>
       <button class="btn btn-reject" onclick="gesture('${bundleId}','reject')">Reject</button>`;
  return `<div class="card" id="card-${bundleId}">
    <div class="card-direction">${escapeHtml(card.directionSummary)}</div>
    <div class="card-meta">
      <span class="badge badge-neutral">Blast radius: ${card.blastRadius} files</span>
      ${driftBadge(card.drift)} ${flags}
    </div>
    ${renderSignals(card.drift)}
    <div class="residual">${escapeHtml(card.residualDisclosure)}</div>
    <div class="gestures">${gestures}</div>
  </div>`;
}

async function loadReview() {
  const cards = await api('GET', '/bundles');
  const el = document.getElementById('card-list');
  el.innerHTML = cards.length ? cards.map(c => cardHtml(c, false)).join('') : '<div class="empty">No bundles in review queue.</div>';
}

async function loadShelf() {
  const cards = await api('GET', '/shelf');
  const el = document.getElementById('shelf-list');
  el.innerHTML = cards.length ? cards.map(c => cardHtml(c, true)).join('') : '<div class="empty">Shelf is empty.</div>';
}

async function loadQueue() {
  const entries = await api('GET', '/queue');
  const el = document.getElementById('queue-list');
  if (!entries.length) { el.innerHTML = '<div class="empty">Merge queue is empty.</div>'; return; }
  el.innerHTML = entries.map(e => `<div class="queue-entry">
    <div><div>${escapeHtml(e.bundle.direction)}</div><div class="entry-id">${escapeHtml(e.bundleId)}</div></div>
    <span class="status-badge status-${escapeHtml(e.status)}">${escapeHtml(e.status)}</span>
  </div>`).join('');
}

async function gesture(bundleId, action) {
  await api('POST', `/bundles/${bundleId}/gesture`, { action });
  loadReview();
  if (action === 'defer') loadShelf();
  if (action === 'accept') loadQueue();
}

async function promote(bundleId) {
  await api('DELETE', `/shelf/${bundleId}`);
  loadShelf();
  loadReview();
}

document.getElementById('btn-process').addEventListener('click', async () => {
  await api('POST', '/queue/process');
  loadQueue();
});

document.getElementById('btn-ingest').addEventListener('click', async () => {
  const raw = document.getElementById('ingest-payload').value.trim();
  const el = document.getElementById('ingest-result');
  try {
    const body = JSON.parse(raw);
    const result = await api('POST', '/prs/ingest', body);
    el.textContent = `Ingested: ${result.bundlesCreated} bundle(s) created.`;
    el.className = 'result-msg';
    el.style.display = 'block';
    loadReview();
  } catch (e) {
    el.textContent = 'Error: ' + e.message;
    el.className = 'result-msg error';
    el.style.display = 'block';
  }
});

const LOCAL_HOSTNAMES = new Set(['localhost', '127.0.0.1', '::1']);
const clearAllBtn = document.getElementById('btn-clear-all');
if (LOCAL_HOSTNAMES.has(location.hostname)) {
  clearAllBtn.style.display = 'inline-block';
}
clearAllBtn.addEventListener('click', async () => {
  if (!confirm('Clear all stored content (bundles, shelf, merge queue, audit log)? This cannot be undone.')) return;
  // Custom header forces a CORS preflight, so a cross-origin page can't trigger this via a bare fetch().
  const result = await api('POST', '/admin/reset', undefined, { 'X-Quire-Admin': '1' });
  if (result.error) {
    alert('Could not clear data: ' + result.error);
    return;
  }
  loadReview();
  loadShelf();
  loadQueue();
});

// Theme: "paper" (light, default) and "ink" (dark) — same tokens, see styles/tokens.css.
const THEME_KEY = 'quire-theme';
const themeBtn = document.getElementById('btn-theme');
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  themeBtn.textContent = theme === 'ink' ? 'Light' : 'Dark';
}
applyTheme(localStorage.getItem(THEME_KEY) === 'ink' ? 'ink' : 'paper');
themeBtn.addEventListener('click', () => {
  const next = document.documentElement.getAttribute('data-theme') === 'ink' ? 'paper' : 'ink';
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
});

// Narrow viewports get the touch-gesture mobile view by default; ?desktop=1 opts out,
// and the opt-out is remembered so a later reload/bookmark doesn't bounce back to mobile.
// Checked before the initial load so a redirecting visit never fires a wasted fetch/render first.
const VIEW_PREF_KEY = 'quire-view-pref';
if (location.search.includes('desktop=1')) {
  localStorage.setItem(VIEW_PREF_KEY, 'desktop');
}
if (window.innerWidth <= 700 && localStorage.getItem(VIEW_PREF_KEY) !== 'desktop') {
  location.replace('mobile.html');
} else {
  loadReview();
}
document.getElementById('link-mobile').addEventListener('click', () => {
  localStorage.removeItem(VIEW_PREF_KEY);
});
</script>
</body>
</html>
