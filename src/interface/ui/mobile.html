<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNyIgZmlsbD0iIzYzNjZmMSIvPjx0ZXh0IHg9IjE2IiB5PSIyMyIgZm9udC1mYW1pbHk9InN5c3RlbS11aSxzYW5zLXNlcmlmIiBmb250LXNpemU9IjE4IiBmb250LXdlaWdodD0iNzAwIiBmaWxsPSIjZmZmZmZmIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj5RPC90ZXh0Pjwvc3ZnPg==">
<title>Quire</title>
<link rel="stylesheet" href="styles/tokens.css">

<style>
  html, body { height: 100%; }
  body {
    display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  header {
    flex: 0 0 auto; padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--color-border);
    background: var(--color-surface-card);
    display: flex; align-items: center; gap: var(--space-2);
  }
  header h1 {
    font-family: var(--font-display); font-size: var(--text-lg); font-weight: var(--weight-semibold);
    letter-spacing: var(--tracking-tight); color: var(--color-text-primary);
  }
  header .subtitle { font-size: var(--text-xs); color: var(--color-text-muted); flex: 1; }
  header a { font-size: var(--text-sm); color: var(--color-brand); text-decoration: none; }

  main { flex: 1 1 auto; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; background: var(--color-surface-page); }
  .pane { display: none; padding: var(--space-4); height: 100%; }
  .pane.active { display: flex; flex-direction: column; }

  /* --- Review: swipeable card stack --- */
  #pane-review { padding: var(--space-4) 0 0; }
  .stack { position: relative; flex: 1 1 auto; min-height: 0; margin: 0 var(--space-4); }
  .stack-card {
    position: absolute; inset: 0;
    background: var(--color-surface-card); border: 1px solid var(--color-border); border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md);
    padding: var(--space-5); display: flex; flex-direction: column; overflow-y: auto;
    touch-action: none; will-change: transform; user-select: none;
  }
  .stack-card.dragging { transition: none; }
  .stack-card.snap-back { transition: transform var(--duration-base) var(--ease-settle); }
  .stack-card.fly { transition: transform var(--duration-slow) var(--ease-standard), opacity var(--duration-slow) var(--ease-standard); }

  .card-meta { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-bottom: var(--space-3); }

  .drift-signals {
    margin-top: var(--space-3); padding: var(--space-3); background: var(--color-surface-sunken);
    border-left: 2px solid var(--color-flagged); border-radius: var(--radius-sm);
    font-size: var(--text-sm); color: var(--color-text-secondary);
  }
  .drift-signals strong { color: var(--color-text-primary); font-weight: var(--weight-medium); }
  .drift-signals ul { padding-left: var(--space-4); margin: var(--space-1) 0 0; }
  .drift-signals li { margin-top: var(--space-1); }

  /* Stamps are a calm seal of intent, not a scoreboard flash. */
  .stamp {
    position: absolute; top: var(--space-4); padding: var(--space-2) var(--space-4); font-size: var(--text-base);
    font-weight: var(--weight-semibold); letter-spacing: var(--tracking-wider); text-transform: uppercase;
    border-radius: var(--radius-md); border: 2px solid; opacity: 0; pointer-events: none;
    font-family: var(--font-display); background: var(--color-surface-card);
  }
  .stamp-accept { right: var(--space-4); color: var(--color-accept); border-color: var(--color-accept); transform: rotate(8deg); }
  .stamp-reject { left: var(--space-4); color: var(--color-reject); border-color: var(--color-reject); transform: rotate(-8deg); }
  .stamp-defer  { left: 50%; bottom: var(--space-4); top: auto; transform: translateX(-50%); color: var(--color-defer); border-color: var(--color-defer); }

  .stack-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--color-text-faint); font-size: var(--text-base); }

  .gesture-hints {
    flex: 0 0 auto; display: flex; justify-content: space-between; padding: var(--space-3) var(--space-6) var(--space-1);
    font-size: var(--text-xs); color: var(--color-text-faint); letter-spacing: var(--tracking-wide);
  }
  .gesture-hints span { display: inline-flex; align-items: center; gap: var(--space-1); }
  .gesture-hints svg { width: var(--space-3); height: var(--space-3); }

  .tap-gestures { flex: 0 0 auto; display: flex; gap: var(--space-3); padding: var(--space-3) var(--space-4) calc(var(--space-3) + env(safe-area-inset-bottom)); }
  .tap-gestures .btn { flex: 1; padding: var(--space-3) 0; text-align: center; }

  /* --- Shelf / Queue lists --- */
  .list { display: flex; flex-direction: column; gap: var(--space-3); overflow-y: auto; }
  .list-card .card-direction { font-size: var(--text-base); margin-bottom: var(--space-3); }
  .list-card .btn { width: 100%; padding: var(--space-3) 0; margin-top: var(--space-3); text-align: center; }

  .queue-entry { font-size: var(--text-sm); display: flex; justify-content: space-between; align-items: center; }
  .queue-entry .entry-id { font-family: var(--font-mono); color: var(--color-text-muted); font-size: var(--text-xs); }
  .status-badge { font-size: var(--text-xs); padding: var(--space-1) var(--space-3); border-radius: var(--radius-pill); }
  .status-queued  { background: var(--color-surface-sunken); color: var(--color-text-secondary); }
  .status-landing { background: var(--color-flagged-wash); color: var(--color-flagged); }
  .status-landed  { background: var(--color-accept-wash); color: var(--color-accept); }

  .ingest-form p { font-size: var(--text-sm); color: var(--color-text-muted); margin-bottom: var(--space-3); }
  .ingest-form textarea {
    width: 100%; height: 40vh; background: var(--color-surface-overlay); border: 1px solid var(--color-border);
    border-radius: var(--radius-md); color: var(--color-text-primary); font-family: var(--font-mono);
    font-size: var(--text-sm); padding: var(--space-3); resize: vertical;
  }
  .ingest-form .btn-ingest { margin-top: var(--space-3); width: 100%; text-align: center; }
  .result-msg { margin-top: var(--space-3); font-size: var(--text-sm); color: var(--color-accept); }
  .result-msg.error { color: var(--color-reject); }

  .empty { color: var(--color-text-faint); font-size: var(--text-base); padding: var(--space-10) 0; text-align: center; }

  /* --- Bottom tab bar --- */
  nav.tabbar {
    flex: 0 0 auto; display: flex; border-top: 1px solid var(--color-border); background: var(--color-surface-card);
    padding-bottom: env(safe-area-inset-bottom);
  }
  nav.tabbar .tab {
    flex: 1; text-align: center; padding: var(--space-3) 0 var(--space-2); font-size: var(--text-xs);
    color: var(--color-text-muted); border-top: 2px solid transparent; cursor: pointer;
  }
  nav.tabbar .tab .icon { display: block; margin-bottom: var(--space-1); }
  nav.tabbar .tab .icon svg { width: var(--text-lg); height: var(--text-lg); }
  nav.tabbar .tab.active { color: var(--color-brand); border-top-color: var(--color-brand); }

  #toast {
    position: fixed; left: var(--space-4); right: var(--space-4); bottom: calc(78px + env(safe-area-inset-bottom));
    background: var(--color-reject-wash); color: var(--color-reject); border: 1px solid var(--color-reject);
    border-radius: var(--radius-md); padding: var(--space-3); font-size: var(--text-sm); text-align: center;
    opacity: 0; pointer-events: none; transition: opacity var(--duration-base) var(--ease-standard); z-index: 100;
  }
  #toast.visible { opacity: 1; }
</style>
</head>
<body>
<header>
  <h1>Quire</h1>
  <span class="subtitle">Mobile triage</span>
  <a href="index.html?desktop=1">Desktop view</a>
</header>

<main>
  <div id="pane-review" class="pane active">
    <div class="stack" id="stack"></div>
    <div class="gesture-hints">
      <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg> reject</span>
      <span>defer <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg></span>
      <span>accept <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></span>
    </div>
    <div class="tap-gestures">
      <button class="btn btn-reject" id="btn-tap-reject">Reject</button>
      <button class="btn btn-defer" id="btn-tap-defer">Defer</button>
      <button class="btn btn-accept" id="btn-tap-accept">Accept</button>
    </div>
  </div>

  <div id="pane-shelf" class="pane">
    <div class="list" id="shelf-list"><div class="empty">Shelf is empty.</div></div>
  </div>

  <div id="pane-queue" class="pane">
    <div class="list" id="queue-list" style="flex:1"><div class="empty">Merge queue is empty.</div></div>
    <button class="btn btn-accept" style="margin-top:14px" id="btn-process">Process next</button>
  </div>

  <div id="pane-ingest" class="pane">
    <div class="ingest-form">
      <p>Paste a PR payload (or array of payloads) as JSON:</p>
      <textarea id="ingest-payload" placeholder='{"id":"pr-1","repoOwner":"org","repoName":"repo","number":1,"declaredDirection":"add passwordless auth","diff":{"raw":"...","hunks":[]},"ciStatus":"success"}'></textarea>
      <button class="btn btn-defer btn-ingest" id="btn-ingest">Ingest</button>
      <div id="ingest-result" class="result-msg" style="display:none"></div>
    </div>
  </div>
</main>

<nav class="tabbar">
  <div class="tab active" data-tab="review"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg></span>Review</div>
  <div class="tab" data-tab="shelf"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"/><path d="M12 22V12"/><polyline points="3.29 7 12 12 20.71 7"/><path d="m7.5 4.27 9 5.15"/></svg></span>Shelf</div>
  <div class="tab" data-tab="queue"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 22h14"/><path d="M5 2h14"/><path d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22"/><path d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/></svg></span>Queue</div>
  <div class="tab" data-tab="ingest"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg></span>Ingest</div>
</nav>

<div id="toast"></div>

<script>
const tabs = document.querySelectorAll('.tab');
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    document.getElementById('pane-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'review') loadReview();
    if (tab.dataset.tab === 'shelf') loadShelf();
    if (tab.dataset.tab === 'queue') loadQueue();
  });
});

async function api(method, path, body, extraHeaders) {
  const opts = { method, headers: { 'Content-Type': 'application/json', ...(extraHeaders || {}) } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function driftBadge(drift) {
  if (drift.status === 'clean') return '<span class="badge badge-clean">Clean</span>';
  return '<span class="badge badge-flagged">Drift flagged</span>';
}

function renderSignals(drift) {
  if (drift.status !== 'flagged') return '';
  const items = drift.signals.map(s => {
    if (s.kind === 'effectList') return `Orphan effects: ${escapeHtml(s.orphanClauses.join(', '))}`;
    if (s.kind === 'footprintAnomaly') return `Surprising symbols: ${escapeHtml(s.surprisingSymbols.map(x => x.name).join(', '))}`;
    return escapeHtml(s.description);
  });
  return `<div class="drift-signals"><strong>Drift signals (noted, not an error)</strong><ul>${items.map(i => `<li>${i}</li>`).join('')}</ul></div>`;
}

function cardBodyHtml(card) {
  const flags = card.flags.map(f => `<span class="badge badge-neutral">${escapeHtml(f)}</span>`).join('');
  return `<div class="card-direction">${escapeHtml(card.directionSummary)}</div>
    <div class="card-meta">
      <span class="badge badge-neutral">Blast radius: ${card.blastRadius} files</span>
      ${driftBadge(card.drift)} ${flags}
    </div>
    ${renderSignals(card.drift)}
    <div class="residual">${escapeHtml(card.residualDisclosure)}</div>`;
}

// --- Review: swipeable stack ---
const stackEl = document.getElementById('stack');
let reviewCards = [];
let topCardEl = null;
// True from the moment a gesture commits until the stack has actually
// re-rendered to match it, so a second drag/tap can't act on stale data
// or a stale DOM node while that re-render is still pending.
let gestureInFlight = false;
const STACK_DEPTH = 3;
const SWIPE_X = 110;
const SWIPE_Y = 100;
const STAMP_DEADZONE = 24;

async function loadReview() {
  reviewCards = await api('GET', '/bundles');
  renderStack();
}

function renderStack() {
  stackEl.innerHTML = '';
  topCardEl = null;
  gestureInFlight = false;
  if (!reviewCards.length) {
    stackEl.innerHTML = '<div class="stack-empty">No bundles in review queue.</div>';
    return;
  }
  const visible = reviewCards.slice(0, STACK_DEPTH).reverse();
  visible.forEach((card, i) => {
    const depthFromTop = visible.length - 1 - i;
    const el = document.createElement('div');
    el.className = 'stack-card';
    el.style.transform = `translateY(${depthFromTop * 8}px) scale(${1 - depthFromTop * 0.04})`;
    el.style.zIndex = String(i);
    el.innerHTML = cardBodyHtml(card) +
      '<div class="stamp stamp-accept">Accept</div>' +
      '<div class="stamp stamp-reject">Reject</div>' +
      '<div class="stamp stamp-defer">Defer</div>';
    if (depthFromTop === 0) {
      attachDrag(el, card);
      topCardEl = el;
    }
    stackEl.appendChild(el);
  });
}

function attachDrag(el, card) {
  let startX = 0, startY = 0, dx = 0, dy = 0, dragging = false;
  const stampA = el.querySelector('.stamp-accept');
  const stampR = el.querySelector('.stamp-reject');
  const stampD = el.querySelector('.stamp-defer');

  function snapBack() {
    el.classList.add('snap-back');
    el.style.transform = 'translate(0,0) rotate(0deg)';
    stampA.style.opacity = '0';
    stampR.style.opacity = '0';
    stampD.style.opacity = '0';
  }

  function onMove(e) {
    if (!dragging) return;
    const rawDx = e.clientX - startX;
    const rawDy = e.clientY - startY;

    // Restrict the card to one of three axes — left, right, or down —
    // instead of following the raw 2D finger position. Whichever axis
    // dominates the drag wins; the other axis is pinned to 0, and an
    // upward drag is clamped to 0 rather than allowed negative.
    if (rawDy > Math.abs(rawDx)) {
      dx = 0;
      dy = Math.max(0, rawDy);
    } else {
      dx = rawDx;
      dy = 0;
    }

    const rotate = dx / 18;
    el.style.transform = `translate(${dx}px, ${dy}px) rotate(${rotate}deg)`;

    // Exactly one stamp may show at a time: pick the single dominant
    // direction for this drag and snap it fully on, with the other two
    // fully off. No partial/fading opacity — that's what let two stamps
    // appear at once on a diagonal drag.
    let active = null;
    if (dy > STAMP_DEADZONE) {
      active = 'defer';
    } else if (dx > STAMP_DEADZONE) {
      active = 'accept';
    } else if (dx < -STAMP_DEADZONE) {
      active = 'reject';
    }
    stampA.style.opacity = active === 'accept' ? '1' : '0';
    stampR.style.opacity = active === 'reject' ? '1' : '0';
    stampD.style.opacity = active === 'defer' ? '1' : '0';
  }

  function endDrag() {
    dragging = false;
    el.classList.remove('dragging');
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
    window.removeEventListener('pointercancel', onCancel);
  }

  function onUp() {
    if (!dragging) return;
    endDrag();

    if (gestureInFlight) {
      // Another gesture (e.g. a second touch tapping a button) already
      // committed this card while we were mid-drag; don't double-fire.
      snapBack();
      return;
    }

    if (dy > SWIPE_Y && dy > Math.abs(dx)) {
      commit(el, card, 'defer', `translate(${dx}px, 600px) rotate(0deg)`);
    } else if (dx > SWIPE_X) {
      commit(el, card, 'accept', `translate(900px, ${dy}px) rotate(20deg)`);
    } else if (dx < -SWIPE_X) {
      commit(el, card, 'reject', `translate(-900px, ${dy}px) rotate(-20deg)`);
    } else {
      snapBack();
    }
  }

  function onCancel() {
    // The platform aborted the touch (e.g. an OS edge-swipe gesture) — no
    // pointerup will follow for this pointer, so end the drag here instead
    // of leaving `dragging` stuck true and the window listeners attached.
    if (!dragging) return;
    endDrag();
    snapBack();
  }

  el.addEventListener('pointerdown', (e) => {
    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
    el.classList.add('dragging');
    el.setPointerCapture(e.pointerId);
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
    window.addEventListener('pointercancel', onCancel);
  });
}

function showError(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('visible');
  clearTimeout(showError._t);
  showError._t = setTimeout(() => toast.classList.remove('visible'), 3500);
}

function commit(el, card, action, flyTransform) {
  if (gestureInFlight) return; // already acted on this card via another input path
  gestureInFlight = true;
  el.classList.add('fly');
  el.style.transform = flyTransform;
  el.style.opacity = '0';
  const restoreIndex = reviewCards.findIndex(c => c.bundleId === card.bundleId);
  reviewCards = reviewCards.filter(c => c.bundleId !== card.bundleId);
  setTimeout(renderStack, 300);

  fetch(`/bundles/${card.bundleId}/gesture`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action }),
  }).then(async (r) => {
    if (!r.ok) {
      const body = await r.json().catch(() => ({}));
      throw new Error(body.error || `Request failed (${r.status})`);
    }
    if (action === 'defer') loadShelf();
  }).catch((err) => {
    const at = Math.min(restoreIndex < 0 ? 0 : restoreIndex, reviewCards.length);
    reviewCards.splice(at, 0, card);
    renderStack();
    showError(`Could not ${action} — ${err.message}`);
  });
}

function tapGesture(action) {
  if (!reviewCards.length || gestureInFlight || !topCardEl) return;
  const card = reviewCards[0];
  const el = topCardEl;
  const flyTransform = action === 'accept' ? 'translate(900px, 0) rotate(20deg)'
    : action === 'reject' ? 'translate(-900px, 0) rotate(-20deg)'
    : 'translate(0, 600px) rotate(0deg)';
  commit(el, card, action, flyTransform);
}

document.getElementById('btn-tap-accept').addEventListener('click', () => tapGesture('accept'));
document.getElementById('btn-tap-defer').addEventListener('click', () => tapGesture('defer'));
document.getElementById('btn-tap-reject').addEventListener('click', () => tapGesture('reject'));

// --- Shelf ---
async function loadShelf() {
  const cards = await api('GET', '/shelf');
  const el = document.getElementById('shelf-list');
  el.innerHTML = cards.length ? cards.map(c => `<div class="list-card card">
    ${cardBodyHtml(c)}
    <button class="btn btn-accept" onclick="promote('${escapeHtml(c.bundleId)}')">Unshelf</button>
  </div>`).join('') : '<div class="empty">Shelf is empty.</div>';
}

async function promote(bundleId) {
  await api('DELETE', `/shelf/${bundleId}`);
  loadShelf();
  loadReview();
}

// --- Queue ---
async function loadQueue() {
  const entries = await api('GET', '/queue');
  const el = document.getElementById('queue-list');
  if (!entries.length) { el.innerHTML = '<div class="empty">Merge queue is empty.</div>'; return; }
  el.innerHTML = entries.map(e => `<div class="queue-entry card">
    <div><div>${escapeHtml(e.bundle.direction)}</div><div class="entry-id">${escapeHtml(e.bundleId)}</div></div>
    <span class="status-badge status-${escapeHtml(e.status)}">${escapeHtml(e.status)}</span>
  </div>`).join('');
}

document.getElementById('btn-process').addEventListener('click', async () => {
  await api('POST', '/queue/process');
  loadQueue();
});

// --- Ingest ---
document.getElementById('btn-ingest').addEventListener('click', async () => {
  const raw = document.getElementById('ingest-payload').value.trim();
  const el = document.getElementById('ingest-result');
  try {
    const body = JSON.parse(raw);
    const result = await api('POST', '/prs/ingest', body);
    el.textContent = `Ingested: ${result.bundlesCreated} bundle(s) created.`;
    el.className = 'result-msg';
    el.style.display = 'block';
    loadReview();
  } catch (e) {
    el.textContent = 'Error: ' + e.message;
    el.className = 'result-msg error';
    el.style.display = 'block';
  }
});

// Theme: "paper" (light, default) and "ink" (dark) — kept in sync with the desktop view.
const THEME_KEY = 'quire-theme';
document.documentElement.setAttribute('data-theme', localStorage.getItem(THEME_KEY) === 'ink' ? 'ink' : 'paper');

loadReview();
</script>
</body>
</html>
